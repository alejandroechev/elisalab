<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Plate body -->
  <rect x="2" y="4" width="28" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <!-- Wells: 6 rows × 8 cols with yellow→teal gradient (standard curve columns) -->
  <g>
    <!-- Col 1 - yellow (high conc) -->
    <circle cx="6"  cy="8"  r="1.2" fill="#f0c040"/><circle cx="6"  cy="12" r="1.2" fill="#f0c040"/>
    <circle cx="6"  cy="16" r="1.2" fill="#f0c040"/><circle cx="6"  cy="20" r="1.2" fill="#f0c040"/>
    <circle cx="6"  cy="24" r="1.2" fill="#f0c040"/>
    <!-- Col 2 -->
    <circle cx="9.5" cy="8"  r="1.2" fill="#c8c040"/><circle cx="9.5" cy="12" r="1.2" fill="#c8c040"/>
    <circle cx="9.5" cy="16" r="1.2" fill="#c8c040"/><circle cx="9.5" cy="20" r="1.2" fill="#c8c040"/>
    <circle cx="9.5" cy="24" r="1.2" fill="#c8c040"/>
    <!-- Col 3 -->
    <circle cx="13" cy="8"  r="1.2" fill="#80b858"/><circle cx="13" cy="12" r="1.2" fill="#80b858"/>
    <circle cx="13" cy="16" r="1.2" fill="#80b858"/><circle cx="13" cy="20" r="1.2" fill="#80b858"/>
    <circle cx="13" cy="24" r="1.2" fill="#80b858"/>
    <!-- Col 4 -->
    <circle cx="16.5" cy="8"  r="1.2" fill="#50a878"/><circle cx="16.5" cy="12" r="1.2" fill="#50a878"/>
    <circle cx="16.5" cy="16" r="1.2" fill="#50a878"/><circle cx="16.5" cy="20" r="1.2" fill="#50a878"/>
    <circle cx="16.5" cy="24" r="1.2" fill="#50a878"/>
    <!-- Col 5 -->
    <circle cx="20" cy="8"  r="1.2" fill="#309898"/><circle cx="20" cy="12" r="1.2" fill="#309898"/>
    <circle cx="20" cy="16" r="1.2" fill="#309898"/><circle cx="20" cy="20" r="1.2" fill="#309898"/>
    <circle cx="20" cy="24" r="1.2" fill="#309898"/>
    <!-- Col 6 -->
    <circle cx="23.5" cy="8"  r="1.2" fill="#2080a0"/><circle cx="23.5" cy="12" r="1.2" fill="#2080a0"/>
    <circle cx="23.5" cy="16" r="1.2" fill="#2080a0"/><circle cx="23.5" cy="20" r="1.2" fill="#2080a0"/>
    <circle cx="23.5" cy="24" r="1.2" fill="#2080a0"/>
    <!-- Col 7 -->
    <circle cx="27" cy="8"  r="1.2" fill="#1868a8"/><circle cx="27" cy="12" r="1.2" fill="#1868a8"/>
    <circle cx="27" cy="16" r="1.2" fill="#1868a8"/><circle cx="27" cy="20" r="1.2" fill="#1868a8"/>
    <circle cx="27" cy="24" r="1.2" fill="#1868a8"/>
  </g>
